run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - staticcheck
    - unused
    - govet
    - gofmt
    - misspell
    - bodyclose
    - noctx

linters-settings:
  errcheck:
    check-type-assertions: true
  gosec:
    severity: medium
    confidence: medium

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck
